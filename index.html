<html lang="en">
    <head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
<title>Productivity helper</title>
<link rel="stylesheet" href="./styles.css">    
<body><section class="content">
    <h1 class="header">Productivity helper</h1>

    <div id="goals" class="container_box">
        <h2>establish goals</h2>
        <section class="daily">
            <h3>daily tasks</h3>
            <ul>
            <li><input type="checkbox" id="task1check" name="taskcheck" class="taskcheck"></input>
            <input type="text" id="task1text" name="tasktext" class="tasktext"></input></li>
            <li><input type="checkbox" id="task2check" name="taskcheck" class="taskcheck"></input>
            <input type="text" id="task2text" name="tasktext" class="tasktext"></input></li>
            <li><input type="checkbox" id="task3check" name="taskcheck" class="taskcheck"></input>
            <input type="text" id="task3text" name="tasktext" class="tasktext"></input></li>
        </ul>
        </section>
        <section class="finished">
            <h3>additional tasks</h3>
            <ul>
            <li><input type="checkbox" id="task4check" name="taskcheck" class="taskcheck"></input>
            <input type="text" id="task4text" name="tasktext" class="tasktext"></input></li>
            <li><input type="checkbox" id="task5check" name="taskcheck" class="taskcheck"></input>
            <input type="text" id="task5text" name="tasktext" class="tasktext"></input></li>
            <li><input type="checkbox" id="task6check" name="taskcheck" class="taskcheck"></input>
            <input type="text" id="task6text" name="tasktext" class="tasktext"></input></li>
        </ul>
        </section>
    </div>
    <div id="timer" class="container_box">
        <h2>time your progress</h2>
       <div class="insert">  <iframe style="width:100%;max-width:360px;height:360px;" src="https://stopwatch-app.com/widget/stopwatch?theme=light&color=purple" frameborder="0"></iframe>
    </div></div>
    <div id="playlist" class="container_box">
        <h2>productivity playlist</h2>
      <div class="insert"> <iframe width="100%" height="250px" src="https://www.youtube.com/embed/He3wAWT-Es4?si=WkymUg8EVws_5xAF" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</iframe></div>
    </div>
</section>

    </body>
</head>
</html>
